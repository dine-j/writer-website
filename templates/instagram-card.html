<!DOCTYPE html>
<html lang="en">
<!--
  ══════════════════════════════════════════════════════════
  INSTAGRAM CARD GENERATOR — Chloe Mandel

  HOW TO EXPORT (Chrome):
  1. Open this file in Chrome.
  2. Open DevTools (Cmd+Option+I).
  3. In the Elements panel, click the <div id="card"> element.
  4. Right-click it → "Capture node screenshot".
  5. Chrome saves a perfect 1080×1350 PNG automatically.
  6. Upload directly to Instagram.

  Target: 1080×1350 px (Instagram portrait post, 4:5)
  ══════════════════════════════════════════════════════════
-->
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/themes/current.css">
  <style>
    :root {
      --ig-crimson-a10:        color-mix(in srgb, var(--crimson) 10%, transparent);
      --ig-crimson-a30:        color-mix(in srgb, var(--crimson) 30%, transparent);
      --ig-crimson-bright-a30: color-mix(in srgb, var(--crimson-bright) 30%, transparent);
      --ig-crimson-bright-a85: color-mix(in srgb, var(--crimson-bright) 85%, transparent);
      --ig-gold-a07:           color-mix(in srgb, var(--gold) 7%,  transparent);
      --ig-gold-a14:           color-mix(in srgb, var(--gold) 14%, transparent);
      --ig-text-dim-a65:       color-mix(in srgb, var(--text-dim) 65%, transparent);
      --ig-text-muted-a70:     color-mix(in srgb, var(--text-muted) 70%, transparent);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-raised);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
      font-family: var(--font-heading);
      -webkit-font-smoothing: antialiased;
    }

    /* ── The card ──────────────────────────────────────── */

    #card {
      width: 1080px;
      height: 1080px;
      flex-shrink: 0;
      background: var(--bg-void);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Atmosphere ────────────────────────────────────── */

    .glow {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .glow--crimson {
      width: 900px;
      height: 900px;
      top: -340px;
      left: -200px;
      background: radial-gradient(circle, var(--ig-crimson-a30) 0%, transparent 65%);
    }

    .glow--gold {
      width: 600px;
      height: 600px;
      top: -180px;
      right: -100px;
      background: radial-gradient(circle, var(--ig-gold-a07) 0%, transparent 65%);
    }

    .glow--deep {
      width: 1100px;
      height: 600px;
      bottom: -240px;
      left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, var(--ig-crimson-a10) 0%, transparent 65%);
    }

    /* ── Frame ─────────────────────────────────────────── */

    .frame {
      position: absolute;
      inset: 44px;
      border: 1px solid var(--border-dim);
      pointer-events: none;
    }

    .frame::before {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1px solid var(--ig-gold-a07);
    }

    .corner {
      position: absolute;
      width: 24px;
      height: 24px;
    }

    .corner--tl { top: -1px;    left: -1px;   border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
    .corner--tr { top: -1px;    right: -1px;  border-top: 2px solid var(--gold); border-right: 2px solid var(--gold); }
    .corner--bl { bottom: -1px; left: -1px;   border-bottom: 2px solid var(--gold); border-left: 2px solid var(--gold); }
    .corner--br { bottom: -1px; right: -1px;  border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }

    /* ── Content ───────────────────────────────────────── */

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .badge {
      font-family: var(--font-heading);
      font-size: 26px;
      font-weight: 500;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--crimson-bright);
      border: 1px solid var(--ig-crimson-bright-a85);
      padding: 13px 36px;
      margin-bottom: 60px;
    }

    .name {
      font-family: var(--font-display);
      font-size: 136px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.04em;
      line-height: 1;
      text-shadow:
        0 0 120px var(--ig-gold-a14),
        0 0 240px var(--ig-crimson-a10);
      margin-bottom: 52px;
    }

    .genre {
      font-family: var(--font-heading);
      font-size: 22px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 72px;
    }

    .hook {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 56px;
      color: var(--ig-text-dim-a65);
      letter-spacing: 0.02em;
      line-height: 1.45;
      max-width: 900px;
      margin-bottom: 72px;
    }

    .divider {
      width: 120px;
      height: 1px;
      background: var(--border-dim);
      margin-bottom: 28px;
    }

    .url {
      font-family: var(--font-heading);
      font-size: 56px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text);
    }
  </style>
</head>
<body>

  <div id="card">
    <div class="glow glow--crimson"></div>
    <div class="glow glow--gold"></div>
    <div class="glow glow--deep"></div>

    <div class="frame">
      <div class="corner corner--tl"></div>
      <div class="corner corner--tr"></div>
      <div class="corner corner--bl"></div>
      <div class="corner corner--br"></div>
    </div>

    <div class="content">
      <p class="url">chloemandel.com</p>
      <p class="genre">Dark Gothic Fantasy</p>
      <div class="divider"></div>
      <p class="hook">&ldquo;Oh no luv&rsquo;, no one escapes from Variska.&rdquo;</p>
      <p class="badge">Debut Novel &mdash; Coming Soon</p>
    </div>
  </div>

</body>
</html>
