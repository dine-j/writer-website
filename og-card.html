<!DOCTYPE html>
<html lang="en">
<!--
  ══════════════════════════════════════════════════════════
  OG IMAGE GENERATOR — Chloe Mandel

  HOW TO EXPORT (Chrome):
  1. Open this file in Chrome.
  2. Open DevTools (Cmd+Option+I).
  3. In the Elements panel, click the <div id="card"> element.
  4. Right-click it → "Capture node screenshot".
  5. Chrome saves a perfect 1200×630 PNG automatically.
  6. Move that file to /images/ and rename it og-image.jpg.
  7. In index.html, uncomment the two og:image meta tags.
  ══════════════════════════════════════════════════════════
-->
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/themes/current.css">
  <style>
    :root {
      /* og-card alpha variants — derived from theme variables via color-mix */
      --og-crimson-a10:        color-mix(in srgb, var(--crimson) 10%, transparent);
      --og-crimson-a28:        color-mix(in srgb, var(--crimson) 28%, transparent);
      --og-crimson-bright-a30: color-mix(in srgb, var(--crimson-bright) 30%, transparent);
      --og-crimson-bright-a85: color-mix(in srgb, var(--crimson-bright) 85%, transparent);
      --og-gold-a07:           color-mix(in srgb, var(--gold) 7%,  transparent);
      --og-gold-a14:           color-mix(in srgb, var(--gold) 14%, transparent);
      --og-gold-a50:           color-mix(in srgb, var(--gold) 50%, transparent);
      --og-text-dim-a50:       color-mix(in srgb, var(--text-dim) 50%, transparent);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-raised);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
      font-family: var(--font-heading);
      -webkit-font-smoothing: antialiased;
    }

    /* ── The card — everything is relative to this ──── */

    #card {
      width: 1200px;
      height: 630px;
      flex-shrink: 0;
      background: var(--bg-void);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Atmosphere ─────────────────────────────────── */

    .glow {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .glow--crimson {
      width: 700px;
      height: 700px;
      top: -200px;
      left: -120px;
      background: radial-gradient(circle, var(--og-crimson-a28) 0%, transparent 65%);
    }

    .glow--gold {
      width: 500px;
      height: 500px;
      top: -120px;
      right: -60px;
      background: radial-gradient(circle, var(--og-gold-a07) 0%, transparent 65%);
    }

    .glow--deep {
      width: 900px;
      height: 400px;
      bottom: -160px;
      left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, var(--og-crimson-a10) 0%, transparent 65%);
    }

    /* ── Frame ──────────────────────────────────────── */

    .frame {
      position: absolute;
      inset: 36px;
      border: 1px solid var(--border-dim);
      pointer-events: none;
    }

    .frame::before {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1px solid var(--og-gold-a07);
    }

    .corner {
      position: absolute;
      width: 18px;
      height: 18px;
    }

    .corner--tl { top: -1px;    left: -1px;   border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
    .corner--tr { top: -1px;    right: -1px;  border-top: 2px solid var(--gold); border-right: 2px solid var(--gold); }
    .corner--bl { bottom: -1px; left: -1px;   border-bottom: 2px solid var(--gold); border-left: 2px solid var(--gold); }
    .corner--br { bottom: -1px; right: -1px;  border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }

    /* ── Content ────────────────────────────────────── */

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .monogram {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 400;
      color: var(--border-subtle);
      letter-spacing: 0.14em;
      margin-bottom: 26px;
    }

    .badge {
      font-family: var(--font-heading);
      font-size: 11px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--og-crimson-bright-a85);
      border: 1px solid var(--og-crimson-bright-a30);
      padding: 6px 20px;
      margin-bottom: 34px;
    }

    .name {
      font-family: var(--font-display);
      font-size: 90px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.04em;
      line-height: 1;
      text-shadow:
        0 0 80px var(--og-gold-a14),
        0 0 160px var(--crimson-a08);
      margin-bottom: 28px;
    }

    .rule {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
    }

    .rule-line {
      width: 130px;
      height: 1px;
      background: var(--border-subtle);
    }

    .rule-glyph {
      color: var(--og-gold-a50);
      font-size: 13px;
    }

    .genre {
      font-family: var(--font-heading);
      font-size: 13px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .hook {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 22px;
      color: var(--og-text-dim-a50);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

  <div id="card">
    <div class="glow glow--crimson"></div>
    <div class="glow glow--gold"></div>
    <div class="glow glow--deep"></div>

    <div class="frame">
      <div class="corner corner--tl"></div>
      <div class="corner corner--tr"></div>
      <div class="corner corner--bl"></div>
      <div class="corner corner--br"></div>
    </div>

    <div class="content">
      <p class="monogram">CM</p>
      <p class="badge">Debut Novel &mdash; Coming Soon</p>
      <h1 class="name">Chloe Mandel</h1>
      <div class="rule">
        <span class="rule-line"></span>
        <span class="rule-glyph">✦</span>
        <span class="rule-line"></span>
      </div>
      <p class="genre">Dark Gothic Fantasy</p>
      <p class="hook">"Oh no luv', no one escapes from Variska."</p>
    </div>
  </div>

</body>
</html>
